[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "logit-diff-lens"
version = "0.0.1"
description = "LogitDiff: logit lens diffing for transformers (Python 3.10.12)"
authors = [{ name = "Annemette Brok Pirchert" }]

dependencies = [
  "torch==2.10.0",
  "transformers==5.3.0",
  "accelerate==1.13.0",
  "bitsandbytes==0.49.2",
  "kernel==0.43.0",
  "peft==0.18.1",
  "scipy==1.15.3",
  "pandas==2.3.3",
  "numpy==2.2.6",
  "matplotlib==3.10.8",
  "seaborn==0.13.2",
  "colorcet==3.1.0",
  "plotly==6.6.0",
  "kaleido==1.2.0",
  "tqdm==4.67.3",
  "python-dotenv==1.2.2"
]